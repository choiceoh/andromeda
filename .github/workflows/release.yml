name: Release

# release-please drives versioning + releases from Conventional Commits.
#
# Flow:
#   1. On every push to main, the `release-please` job maintains a single "release PR"
#      that bumps the version in all three places Tauri reads it from — package.json,
#      src-tauri/tauri.conf.json, src-tauri/Cargo.toml — and updates CHANGELOG.md.
#      (Keeping the three in lockstep is what stops the classic "the .exe says 0.0.1
#      but the tag is v0.0.2" drift.)
#   2. Merging that release PR makes release-please create the git tag `vX.Y.Z` and a
#      GitHub Release, and sets release_created=true.
#   3. The `build` job then builds the Windows + macOS Tauri bundles, signs them and
#      latest.json with the updater key, and uploads them to that release.
#
# No tag-push trigger and no PAT: the build runs in the SAME workflow run as the
# release, so the "a GITHUB_TOKEN action can't trigger another workflow" limitation
# never bites (a tag-triggered build would silently never fire).
#
# Versioning (pre-1.0, see release-please-config.json): feat & fix → patch (0.0.x),
# a `!` / BREAKING CHANGE → minor (0.x.0). Past 1.0 this becomes the usual semver.
#
# Auto-update REQUIRES two repo secrets (TAURI_SIGNING_PRIVATE_KEY[_PASSWORD]) — the
# minisign key that signs the bundles + latest.json. They're already set.
#
# Builds are NOT OS-code-signed (no Authenticode / Apple notarization), so first-launch
# warnings remain:
#   - macOS: right-click → Open, or `xattr -dr com.apple.quarantine /Applications/Andromeda.app`
#   - Windows: SmartScreen → More info → Run anyway
# To enable OS signing/notarization later, set the secrets in the commented block below.

on:
  # ⚠️ 이 레포는 Deneb 모노레포(Deneb/andromeda)로 이관·동결됨 (2026-06-24).
  # 자동 릴리즈 비활성화 — andromeda 릴리즈는 이제 Deneb의 release-please가 담당.
  # 개발은 https://github.com/choiceoh/Deneb 의 andromeda/ 에서. 수동 실행만 비상용으로 남김.
  workflow_dispatch:

# release-please needs to open PRs and create releases/tags; tauri-action uploads assets.
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      release_id: ${{ steps.release.outputs.id }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build:
    # Only after a release PR is merged (release-please created the release + tag).
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon (arm64)
            args: "--target aarch64-apple-darwin"
            rust_target: aarch64-apple-darwin
          - platform: macos-latest # Intel (x86_64) — drop this row if unneeded
            args: "--target x86_64-apple-darwin"
            rust_target: x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            rust_target: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build bundles and upload to the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- Updater signing (REQUIRED for auto-update) ---
          # Signs the bundles + latest.json with the minisign key whose public half
          # lives in tauri.conf.json > plugins.updater.pubkey. Without these the
          # updater rejects every download. Set via: gh secret set TAURI_SIGNING_PRIVATE_KEY
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # --- macOS signing & notarization (optional; add as repo secrets to enable) ---
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          # Upload into the release release-please just created (don't create a new one).
          releaseId: ${{ needs.release-please.outputs.release_id }}
          args: ${{ matrix.args }}
