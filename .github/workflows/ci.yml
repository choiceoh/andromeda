name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

  wire-drift:
    # The generated wire types (src/gen/miniappWire.ts) must stay in sync with the
    # gateway's //deneb:wire structs. Regenerate from the Deneb source and diff —
    # fails if the gateway contract changed but the committed types weren't updated.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Deneb (gateway contract source)
        uses: actions/checkout@v4
        with:
          repository: choiceoh/Deneb
          path: .deneb-src

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Verify wire types are up to date
        run: DENEB_DIR="$GITHUB_WORKSPACE/.deneb-src" node scripts/gen-wire.mjs --check
